<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Puzzle 2 — Validación con Fetch</title>
  <link rel="stylesheet" href="../../../styles.css" />
  <style>
    body { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .contenedor { max-width: 520px; }
    h2 { font-size: 1.2rem; color: #00eaff; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }
    .instrucciones { text-align: left; margin-bottom: 20px; font-size: 0.9rem; color: rgba(0,255,106,0.8); border: 1px solid rgba(0,255,106,0.15); padding: 14px 18px; }
    .acciones { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    #bloqueo-puzzle2 { margin-bottom: 20px; }
    #bloqueo-puzzle2 p { margin-bottom: 10px; color: rgba(0,255,106,0.8); font-size: 0.9rem; }
    #bloqueo-puzzle2 input { width: 100%; max-width: 280px; margin-bottom: 10px; }
    #resultado { margin-top: 16px; font-size: 0.95rem; min-height: 1.5em; color: #00ff6a; }
  </style>
</head>
<body>
  <div class="contenedor terminal">
    <h2 class="titulo-parpadeo">⧩ Puzzle 2 — Validación con Fetch</h2>

    <div id="bloqueo-puzzle2">
      <div class="instrucciones">
        <p>El sistema requiere la palabra oculta dentro del código del nivel anterior. Analiza la respuesta del servidor del Puzzle 1 para encontrarla.</p>
      </div>
      <input type="text" id="respuestaOculta" placeholder="Introduce la palabra oculta">
      <button id="btnValidarOculta">[ Validar ]</button>
      <p id="errorOculta" style="color:#ff0040; display:none;" class="console-line error">[ERROR] Respuesta incorrecta.</p>
    </div>

    <div id="contenedorPuzzle2" class="contenedor" style="display:none;">
      <p class="instrucciones">Observa la secuencia de colores y repítela en el mismo orden.</p>
      <div class="acciones">
        <button onclick="window.location.href='../../../index.html'">[ Volver ]</button>
        <button onclick="window.location.href='../puzzle3/puzzle3.html'">[ Siguiente → ]</button>
      </div>
      <input id="input-codigo" placeholder="Introduce el código">
      <button id="btn-validar">[ Validar ]</button>
      <p id="resultado" class="console-line"></p>
    </div>
  </div>
  <script src="./puzzle2.js"></script>
</body>
</html>
